services:
  postgres:
    image: postgres:16-alpine
    container_name: focusflow-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-focusflow}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-focusflow}
      POSTGRES_DB: ${POSTGRES_DB:-focusflow}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-focusflow} -d ${POSTGRES_DB:-focusflow}"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - focusflow-net

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: focusflow-backend
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql+asyncpg://focusflow:focusflow@postgres:5432/focusflow}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:5173}
      GROQ_API_KEY: ${GROQ_API_KEY:-}
      GROQ_MODEL: ${GROQ_MODEL:-llama-3.3-70b-versatile}
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    volumes:
      - ./backend:/app
    depends_on:
      postgres:
        condition: service_healthy
    command: >
      sh -c "alembic upgrade head &&
             uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"
    networks:
      - focusflow-net

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: focusflow-frontend
    environment:
      VITE_API_URL: ${VITE_API_URL:-http://localhost:8000/api/v1}
    ports:
      - "${FRONTEND_PORT:-5173}:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - backend
    command: npm run dev -- --host 0.0.0.0
    networks:
      - focusflow-net

networks:
  focusflow-net:
    driver: bridge

volumes:
  postgres_data:
